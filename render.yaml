# Render.com deployment configuration
services:
  - type: web
    name: musicjam
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        fromService:
          type: web
          name: musicjam
          property: port
      - key: CLOUDINARY_CLOUD_NAME
        value: lu9erudm
      - key: CLOUDINARY_API_KEY
        value: "643732913946747"
      - key: CLOUDINARY_API_SECRET
        sync: false
    autoDeploy: true
    disk:
      name: musicjam-uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1